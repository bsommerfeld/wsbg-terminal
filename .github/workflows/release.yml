# =============================================================================
#  Release CI
#
#  Builds the full application, collects all runtime JARs, packages them
#  via TinyUpdate, and uploads the OTA artifacts (update.json + files.zip)
#  to the GitHub Release.
#
#  This workflow runs on ubuntu-latest only — every runtime JAR is
#  platform-independent. JCEF's platform-specific Chromium binaries are
#  downloaded by the launcher's JcefInstaller on first run, not bundled
#  in the release artifact.
# =============================================================================

name: Release CI

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build_and_release:
    name: Build, Test & Upload Artifacts
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'zulu'
          cache: maven

      - name: Build and Test with Maven
        id: build_test
        run: mvn clean install -U -Dgpg.skip=true

      # Collect all runtime dependencies into a single directory.
      # No JavaFX classifier resolution: the terminal UI runs in an
      # embedded JCEF browser now, and the launcher uses pure Swing.
      # jcefmaven + Java-WebSocket + Jackson + Guice + Logback get
      # pulled in by Maven automatically.
      - name: Collect Runtime Dependencies
        run: |
          DEPS_DIR="terminal/target/deps"

          mvn dependency:copy-dependencies \
            -pl terminal \
            -DincludeScope=runtime \
            -DoutputDirectory="${GITHUB_WORKSPACE}/${DEPS_DIR}"

      # terminal/target carries the terminal jar itself; terminal/target/deps
      # (from copy-dependencies above) carries every runtime dependency —
      # including all first-party module jars via the Maven graph. New modules
      # need no entry here: depending on them from terminal is enough.
      - name: Package with TinyUpdate
        uses: ./updater/action
        with:
          artifact-dirs: 'terminal/target,terminal/target/deps'
          script-dir: '.script'

      # Launcher self-update channel: the same TinyUpdate mechanism, second
      # instance. A SEPARATE asset pair (launcher-update.json/-files.zip) so
      # pre-self-update launchers keep seeing exactly the assets they know —
      # they ignore these entirely and stay functional. Payload is the one
      # shaded launcher jar under the STABLE name launcher.jar; installed
      # launchers sync it into <appDir>/launcher/ and the native hull re-execs
      # it on the next start when it is strictly newer than the hull itself.
      - name: Package Launcher Self-Update Channel
        run: |
          STAGING=updater-dist/launcher-staging
          mkdir -p "$STAGING"

          # Exactly the shaded fat jar (byte-identical to the jpackage input in
          # package.yml) — never the "original-" unshaded copy.
          SHADED_JAR=$(find launcher/target -maxdepth 1 -name 'launcher-*.jar' ! -name 'original-*' | head -1)
          if [ -z "$SHADED_JAR" ]; then
            echo "::error::No shaded launcher JAR found in launcher/target/"
            exit 1
          fi
          cp "$SHADED_JAR" "$STAGING/launcher.jar"

          SHA256=$(sha256sum "$STAGING/launcher.jar" | cut -d' ' -f1)
          SIZE=$(stat --printf="%s" "$STAGING/launcher.jar")

          # Same manifest shape as updater/action generates for update.json.
          printf '{\n  "version": "%s",\n  "files": [\n    { "path": "launcher.jar", "sha256": "%s", "size": %s }\n  ]\n}\n' \
            "${GITHUB_REF_NAME}" "$SHA256" "$SIZE" > updater-dist/launcher-update.json

          (cd "$STAGING" && zip -r ../launcher-files.zip . -x '.*')
          echo "Launcher channel packaged: version ${GITHUB_REF_NAME}, sha256 ${SHA256}"

      - name: Prepare Build Status Badges
        id: badges
        run: |
          if [ "${{ steps.build_test.outcome }}" = "success" ]; then
            BUILD_BADGE="![Build Success](https://img.shields.io/badge/Build-Success-brightgreen)"
            TEST_BADGE="![Tests Succeeded](https://img.shields.io/badge/Tests-Succeeded-brightgreen)"
          else
            BUILD_BADGE="![Build Failed](https://img.shields.io/badge/Build-Failed-red)"
            TEST_BADGE="![Tests Failed](https://img.shields.io/badge/Tests-Failed-red)"
          fi

          echo "build-badge=${BUILD_BADGE}" >> $GITHUB_OUTPUT
          echo "test-badge=${TEST_BADGE}" >> $GITHUB_OUTPUT

      - name: Update Release with Changelog
        uses: bsommerfeld/release-changelog@v0.1
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          # User-first release notes (NOT the dev-style Added/Changed/
          # Fixed/Removed default) — the changelog IS the release-notes body
          # end users read: one universal "Was hat sich geändert?" heading,
          # free-form story underneath. The action resets CHANGELOG.md to this
          # skeleton after every release; the file stays footer-free.
          changelog-template: |
            # Was hat sich geändert?
          # The download footer lives in append-text, NOT in the changelog file:
          # the action builds the release body as CHANGELOG.md + prepend + append,
          # so append-text lands the platform installer links at the bottom of
          # EVERY release body (including the very first), while CHANGELOG.md stays
          # clean. The /releases/latest/download/ links always resolve to the
          # current release; the matching stable asset names are produced by
          # package.yml's rename step.
          prepend-text: |
            ${{ steps.badges.outputs.build-badge }} ${{ steps.badges.outputs.test-badge }}

            > 💡 **Du hast das Terminal bereits installiert?** Dann musst du den Launcher nicht erneut herunterladen: Klick einfach im offenen Terminal auf den grünen Update-Knopf, und die neue Version wird sofort installiert. Bei eingeschaltetem Auto-Update holt der Launcher sie sonst spätestens beim nächsten Start von selbst.
          append-text: |

            ---

            ## Holt es euch in den Käfig

            [![Windows](https://img.shields.io/badge/Windows-Installer-0078D6?style=for-the-badge&logo=windows&logoColor=white)](https://github.com/bsommerfeld/wsbg-terminal/releases/latest/download/WSBG-Terminal-Windows.exe)
            [![macOS](https://img.shields.io/badge/macOS-Installer-000000?style=for-the-badge&logo=apple&logoColor=white)](https://github.com/bsommerfeld/wsbg-terminal/releases/latest/download/WSBG-Terminal-macOS.dmg)
            [![Linux deb](https://img.shields.io/badge/Linux-.deb-E95420?style=for-the-badge&logo=debian&logoColor=white)](https://github.com/bsommerfeld/wsbg-terminal/releases/latest/download/WSBG-Terminal-Linux.deb)
            [![Linux rpm](https://img.shields.io/badge/Linux-.rpm-EE0000?style=for-the-badge&logo=redhat&logoColor=white)](https://github.com/bsommerfeld/wsbg-terminal/releases/latest/download/WSBG-Terminal-Linux.rpm)

            Immer die neueste Version - die Links zeigen automatisch auf die aktuelle Release.

      - name: Upload TinyUpdate Artifacts
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ github.event.release.tag_name }}" \
            updater-dist/update.json \
            updater-dist/files.zip \
            updater-dist/app.zip \
            updater-dist/deps.zip \
            updater-dist/launcher-update.json \
            updater-dist/launcher-files.zip \
            --clobber
