<!doctype html>
<html lang="de" data-theme="dark">
<head>
  <meta charset="utf-8" />
  <title>WSBG Terminal</title>
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <link rel="stylesheet" href="/css/tokens.css">
  <link rel="stylesheet" href="/css/base.css">
  <link rel="stylesheet" href="/css/titlebar.css">
  <link rel="stylesheet" href="/css/widgets.css">
  <link rel="stylesheet" href="/css/footer.css">
  <link rel="stylesheet" href="/css/donate.css">
</head>
<body>
<div class="app">

  <header class="titlebar" id="titlebar">
    <!-- Window controls (close / minimize / maximize-toggle).
         Conventionally rendered top-left on macOS and top-right on
         Windows/Linux — the slot order is unchanged in markup; CSS
         reorders [data-platform!="mac"] to flex-direction:row-reverse. -->
    <div class="tb-controls">
      <div class="lights">
        <button class="light r" data-window="close"  aria-label="Close"></button>
        <button class="light y" data-window="minimize" aria-label="Minimize"></button>
        <button class="light g" data-window="maximize-toggle" aria-label="Maximize"></button>
      </div>
    </div>

    <div class="tb-title">
      <span>WSB<span class="flag">G</span></span>
      <span class="sep">·</span>
      <span>Terminal</span>
    </div>

    <!-- Theme toggle. Always lives at the opposite end of the window
         controls so the chrome looks symmetric. Icon swaps to a moon
         in light theme / sun in dark theme via CSS. -->
    <div class="tb-actions">
      <!-- Persistent donate "door": always visible (independent of the 12h
           gate), outline that fills + beats on hover, click opens the donate
           page. Pulses as a hint while the footer banner is active. -->
      <a class="iconbtn heart-btn" data-donate href="https://wsbg.app/donate"
         target="_blank" rel="noopener" title="WSBG unterstützen" aria-label="WSBG unterstützen">
        <svg viewBox="0 0 24 24"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
      </a>
      <button class="iconbtn js-theme-toggle" title="Theme umschalten" aria-label="Toggle theme">
        <svg class="icon-sun" viewBox="0 0 24 24"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/></svg>
        <svg class="icon-moon" viewBox="0 0 24 24"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
      </button>
    </div>
  </header>

  <main class="main">
    <section class="widget" id="widget-reddit">
      <header class="widget-head">
        <div class="ident"><a class="glyph glyph-reddit" href="https://www.reddit.com/r/wallstreetbetsGER"
              target="_blank" rel="noopener" title="r/wallstreetbetsGER öffnen"
              aria-label="r/wallstreetbetsGER öffnen"></a>Reddit · Schlagzeilen</div>
        <!-- Market-mood badge: the room's 24h sentiment split ("54% BEARISH"
             ⇒ implies 46% bullish), computed server-side from the published
             headlines (market-mood broadcasts). Mirrors the EUR/USD badge
             slot in the FJ header. Hidden until a directional reading exists. -->
        <span class="mood" id="mood-badge" hidden aria-live="polite"></span>
        <!-- Scraper health lives directly on the LIVE indicator: main.js sets
             data-state + swaps the label to "Defekt" when the pull is degraded
             (403/429/timeouts). The old standalone "RATE LIMITED" chip was
             dropped — Defekt does the job, and the slot belongs to the mood
             badge now. TODO(oauth-login): when degraded > N min, render a
             "Sign in to Reddit" CTA wired to the OAuth flow. -->
        <span class="live" data-state="OK" aria-live="polite">Live</span>
      </header>
      <div class="widget-body" data-rows></div>
    </section>

    <div class="vdivider"></div>

    <section class="widget" id="widget-fj">
      <header class="widget-head">
        <div class="ident"><a class="glyph glyph-fj" href="https://www.financialjuice.com/"
              target="_blank" rel="noopener" title="Financial Juice öffnen"
              aria-label="Financial Juice öffnen"></a>Financial Juice</div>
        <span class="eurusd" id="eurusd-badge" title="EUR/USD"></span>
        <span class="live">Live</span>
      </header>
      <div class="widget-body" data-rows></div>
    </section>
  </main>

  <footer class="footer">
    <div class="feed" id="feed">
      <div class="slide markets" id="markets" data-pos="center"></div>
      <div class="slide ad" id="ad" data-pos="right">
        <div class="ad-inner"></div>
      </div>
    </div>
    <!-- Donate heart for Linux, where the HTML titlebar (its usual home) is
         hidden. Mirrors the footer theme toggle's platform visibility. -->
    <a class="iconbtn heart-btn footer-heart" data-donate href="https://wsbg.app/donate"
       target="_blank" rel="noopener" title="WSBG unterstützen" aria-label="WSBG unterstützen">
      <svg viewBox="0 0 24 24"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
    </a>
    <!-- Theme toggle lives here on Win/Linux, where the HTML titlebar
         (its usual home) is hidden in favour of the native OS title bar.
         Hidden on macOS via CSS — there it stays in the titlebar. -->
    <button class="iconbtn js-theme-toggle footer-theme" title="Theme umschalten" aria-label="Toggle theme">
      <svg class="icon-sun" viewBox="0 0 24 24"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/></svg>
      <svg class="icon-moon" viewBox="0 0 24 24"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
    </button>
  </footer>
</div>

<script type="module" src="/js/main.js"></script>
</body>
</html>
