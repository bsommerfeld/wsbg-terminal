# =============================================================================
#  Package Native Launcher
#
#  Builds platform-specific installers (exe, dmg, deb, rpm) via JPackage.
#  The Launcher is the ONLY module packaged natively — the application itself
#  is delivered via OTA update (see release.yml).
#
#  Linux coverage: .deb (Debian/Ubuntu/Mint) + .rpm (Fedora/openSUSE/RHEL),
#  both produced natively by jpackage. Arch and other distros are NOT
#  packaged natively — jpackage has no pacman type. The deliberate plan if
#  that is ever requested is a single AppImage (jpackage --type app-image
#  wrapped with appimagetool), which covers every Linux distro at once;
#  per-distro native Arch packaging is intentionally out of scope.
#
#  arm64: only amd64/x64 installers are built here. The setup scripts
#  (setup.sh / setup.ps1) already detect arm64 and fetch the matching JCEF
#  natives, but no arm64 launcher installer is shipped yet — add an arm64
#  runner to the matrix when there is demand.
#
#  Robustness notes:
#  - The launcher JAR filename is discovered dynamically (no hardcoded version)
#  - The release tag's "v" prefix is stripped for JPackage compatibility
#  - The shaded JAR is identified explicitly to avoid picking the un-shaded original
# =============================================================================

name: Package Native Launcher

on:
  release:
    types: [published]
  # Manual test builds: produces the same installers but uploads them as
  # workflow ARTIFACTS instead of release assets (there is no release to
  # attach them to). The version input defaults high so a test installer
  # always installs OVER an existing install (downgrades are blocked by
  # the MSI upgrade logic).
  workflow_dispatch:
    inputs:
      version:
        description: 'Installer version for the test build'
        required: false
        default: '9.9.9'

permissions:
  contents: write

jobs:
  package-launcher:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            jpackage-type: exe
            icon-file: .assets/icons/AppIcon.ico
          - os: macos-latest
            jpackage-type: dmg
            icon-file: .assets/icons/AppIcon.icns
          - os: ubuntu-latest
            jpackage-type: deb
            icon-file: .assets/icons/AppIcon-fullbleed.png
          - os: ubuntu-latest
            jpackage-type: rpm
            icon-file: .assets/icons/AppIcon-fullbleed.png

    runs-on: ${{ matrix.os }}
    name: Build ${{ matrix.jpackage-type }}

    # Secrets surfaced as job-level env so step `if:` conditions can gate on them
    # reliably — a step's OWN env block is not readable in that same step's `if:`,
    # which silently skipped the old signing step. All of these are OPTIONAL: with
    # none set, the build still produces an UNSIGNED installer (dev/test releases).
    env:
      # Developer ID Application certificate (.p12 with its private key), base64-encoded,
      # plus the .p12 export password. THIS is the cert type required to ship a DMG
      # outside the App Store — not "Apple Development" / "Mac App Distribution".
      APPLE_CERT_BASE64: ${{ secrets.APPLE_CERT_BASE64 }}
      APPLE_CERT_PASSWORD: ${{ secrets.APPLE_CERT_PASSWORD }}
      # Notarization — provide EITHER the App Store Connect API-key trio …
      AC_API_KEY_P8_BASE64: ${{ secrets.AC_API_KEY_P8_BASE64 }}
      AC_API_KEY_ID: ${{ secrets.AC_API_KEY_ID }}
      AC_API_ISSUER_ID: ${{ secrets.AC_API_ISSUER_ID }}
      # … OR the Apple-ID + app-specific-password trio. Whichever set is present is used.
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'zulu'
          cache: maven

      - name: Build Launcher JAR
        run: mvn clean package -pl launcher -am -DskipTests

      # jpackage shells out to rpmbuild for --type rpm; ubuntu-latest ships
      # dpkg (for .deb) but not the rpm toolchain.
      - name: Install rpmbuild
        if: matrix.jpackage-type == 'rpm'
        run: sudo apt-get update && sudo apt-get install -y rpm

      # jpackage shells out to the WiX Toolset (candle.exe/light.exe) to build
      # the .exe installer. current windows-latest images ship WiX 3.14, so
      # this is normally a no-op — it's a safety net for any future image that
      # drops it. No version pin: pinning an older version than the preinstalled
      # one makes choco fail with a downgrade error. The choco `wixtoolset`
      # package is the WiX 3.x line; jpackage requires WiX 3 (not WiX 4/5).
      - name: Install WiX Toolset
        if: matrix.jpackage-type == 'exe'
        run: choco install wixtoolset --no-progress -y

      - name: Prepare JPackage Input
        shell: bash
        run: |
          mkdir -p jpackage-input

          # The shade plugin produces both the shaded JAR and an "original-" prefixed
          # copy. We need exactly the shaded one — it's the only file without "original-".
          SHADED_JAR=$(find launcher/target -maxdepth 1 -name 'launcher-*.jar' ! -name 'original-*' | head -1)

          if [ -z "$SHADED_JAR" ]; then
            echo "::error::No shaded launcher JAR found in launcher/target/"
            exit 1
          fi

          JAR_NAME=$(basename "$SHADED_JAR")
          echo "Discovered launcher JAR: $JAR_NAME"

          cp "$SHADED_JAR" jpackage-input/

          # Strip "v" prefix from tag for JPackage — it only accepts numeric versions
          # (e.g. "1.2.0"), not "v1.2.0". Manual (workflow_dispatch) test builds
          # have no release tag and use the version input instead; final fallback
          # is "1.0.0" if both are empty.
          RAW_TAG="${{ github.event.release.tag_name }}"
          RAW_TAG="${RAW_TAG:-${{ github.event.inputs.version }}}"
          APP_VERSION="${RAW_TAG#v}"
          APP_VERSION="${APP_VERSION:-1.0.0}"

          echo "JAR_NAME=$JAR_NAME" >> $GITHUB_ENV
          echo "APP_VERSION=$APP_VERSION" >> $GITHUB_ENV

      - name: Import Developer ID certificate (macOS)
        if: matrix.os == 'macos-latest' && env.APPLE_CERT_BASE64 != ''
        # Best-effort: a missing/wrong/expired cert (or wrong password) must NEVER block
        # the release. On failure this step is marked failed-but-continued, MAC_SIGN_IDENTITY
        # stays unset, and jpackage simply produces an UNSIGNED installer that still ships.
        continue-on-error: true
        run: |
          CERT_PATH="$RUNNER_TEMP/developer_id.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"
          KEYCHAIN_PW="$(openssl rand -base64 24)"  # ephemeral, throwaway

          echo -n "$APPLE_CERT_BASE64" | base64 --decode > "$CERT_PATH"

          security create-keychain -p "$KEYCHAIN_PW" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"   # stay unlocked for the whole job
          security unlock-keychain -p "$KEYCHAIN_PW" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -P "$APPLE_CERT_PASSWORD" \
            -k "$KEYCHAIN_PATH" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: \
            -s -k "$KEYCHAIN_PW" "$KEYCHAIN_PATH" >/dev/null
          # CRITICAL fix vs. the old setup: codesign / jpackage search the keychain
          # SEARCH LIST, not the default keychain. Add ours to it (keeping the login
          # keychain) — without this, signing reported "no identity found" and no-op'd.
          security list-keychains -d user -s "$KEYCHAIN_PATH" \
            $(security list-keychains -d user | sed s/\"//g)

          # Resolve the exact Developer ID Application identity to hand jpackage — no
          # extra secret needed, and a clear error if the wrong cert type was imported.
          IDENTITY=$(security find-identity -v -p codesigning "$KEYCHAIN_PATH" \
            | sed -n 's/.*"\(Developer ID Application: .*\)".*/\1/p' | head -1)
          if [ -z "$IDENTITY" ]; then
            echo "::error::No 'Developer ID Application' identity in the imported .p12. Export a"
            echo "::error::Developer ID Application certificate WITH its private key as .p12 (base64 -> APPLE_CERT_BASE64)."
            security find-identity -v -p codesigning "$KEYCHAIN_PATH" || true
            exit 1
          fi
          echo "Signing identity: $IDENTITY"
          echo "MAC_SIGN_IDENTITY=$IDENTITY" >> "$GITHUB_ENV"
          echo "MAC_SIGN_KEYCHAIN=$KEYCHAIN_PATH" >> "$GITHUB_ENV"

      # Build the bundled runtime ourselves. jpackage's own jlink run adds
      # --strip-native-commands, which REMOVES bin/java(.exe) from the runtime.
      # That breaks us: the launcher starts the terminal as a child "java"
      # process (AppLauncher#resolveJava → java.home/bin/java), so a stripped
      # runtime leaves end users with no java → "CreateProcess error=2". Plain
      # jlink keeps the launchers; we then bundle this image verbatim via
      # --runtime-image (jpackage does not re-strip a provided image).
      # ALL-MODULE-PATH = the full JDK module set, so the spawned terminal has
      # every module it needs (JCEF, java.net.http, crypto, …).
      - name: Build bundled runtime (keeps the java launcher)
        shell: bash
        run: |
          rm -rf runtime-image
          # ALL-MODULE-PATH needs an explicit --module-path for jlink (jpackage
          # defaults it, plain jlink does not). Point it at the JDK's own jmods
          # so the image contains the full module set.
          jlink --module-path "$JAVA_HOME/jmods" \
            --add-modules ALL-MODULE-PATH \
            --no-header-files --no-man-pages \
            --output runtime-image
          # Sanity: the launcher MUST exist in the bundled runtime.
          ls "runtime-image/bin/java"* || { echo "::error::jlink runtime has no java launcher"; exit 1; }

      - name: Package with JPackage
        shell: bash
        run: |
          # Build the arg list as an ARRAY so values containing spaces (the signing
          # identity, the app name) never word-split — the old flat $EXTRA_ARGS would
          # have mangled a "Developer ID Application: Name (TEAM)" identity.
          # --runtime-image bundles OUR jlink image (with bin/java) verbatim, so
          # AppLauncher can spawn the terminal even on a machine with no system Java.
          ARGS=(
            --type "${{ matrix.jpackage-type }}"
            --name "WSBG Terminal"
            --app-version "$APP_VERSION"
            --vendor "bsommerfeld"
            --description "WSBG Terminal Launcher"
            --input jpackage-input
            --main-jar "$JAR_NAME"
            --main-class de.bsommerfeld.updater.launcher.LauncherMain
            --runtime-image runtime-image
            --java-options "--enable-preview"
            --icon "${{ matrix.icon-file }}"
            --dest jpackage-output
            --resource-dir .assets/jpackage
            --verbose
          )
          # --resource-dir .assets/jpackage holds per-platform packaging hooks;
          # each bundler only picks up the file names it knows, the rest are
          # ignored: main.wxs (Windows: launch-after-install + uninstall data
          # wipe), postrm (deb: uninstall data wipe), wsbg-terminal.spec (rpm:
          # uninstall data wipe). --verbose so the log shows the "Using custom
          # resource" lines that prove the overrides were actually picked up.
          if [ "${{ matrix.jpackage-type }}" = "exe" ]; then
            # Desktop shortcut + Start Menu entry so the app is immediately visible
            ARGS+=( --win-shortcut --win-menu --win-menu-group WSBG )
          fi
          if [ "${{ matrix.jpackage-type }}" = "dmg" ]; then
            # macOS has no uninstall hook (drag-to-Trash fires nothing), so the
            # DMG ships a visible uninstall script next to the app instead.
            # NO spaces in the file name: jpackage treats them as separators
            # in the --mac-dmg-content list (proven: run 28545239443 failed
            # with NoSuchFileException on the first path segment).
            ARGS+=( --mac-dmg-content ".assets/dmg/WSBG-Terminal-deinstallieren.command" )
          fi
          if [ "${{ matrix.os }}" = "macos-latest" ] && [ -n "$MAC_SIGN_IDENTITY" ]; then
            # Hardened-runtime Developer ID signing (jpackage adds --options runtime +
            # a secure timestamp), identity + keychain made explicit so codesign never
            # guesses. --mac-signing-key-user-name wants the part AFTER the prefix.
            ARGS+=(
              --mac-sign
              --mac-signing-key-user-name "${MAC_SIGN_IDENTITY#Developer ID Application: }"
              --mac-signing-keychain "$MAC_SIGN_KEYCHAIN"
            )
          fi
          jpackage "${ARGS[@]}"

      # Notarize + staple the signed DMG. Signing ALONE is not enough: a downloaded,
      # quarantined DMG is blocked by Gatekeeper unless Apple has notarized it and the
      # ticket is stapled (so it validates offline). This is the step that was missing —
      # without it, even a correctly signed build still showed "cannot check it for
      # malicious software". Runs only when a cert is configured; self-skips (build still
      # succeeds, unsigned/un-notarized) when no notarization credentials are present.
      - name: Notarize and staple (macOS)
        # Only when the DMG was actually SIGNED (notarizing an unsigned DMG can't work).
        if: matrix.jpackage-type == 'dmg' && env.MAC_SIGN_IDENTITY != ''
        # Best-effort: bad/expired notary creds degrade to "signed but not notarized"
        # (Gatekeeper warns, README workaround applies) instead of failing the release.
        continue-on-error: true
        shell: bash
        run: |
          DMG=$(find jpackage-output -maxdepth 1 -type f -name '*.dmg' | head -1)
          if [ -z "$DMG" ]; then echo "::error::no DMG found to notarize"; exit 1; fi

          if [ -n "$AC_API_KEY_P8_BASE64" ] && [ -n "$AC_API_KEY_ID" ] && [ -n "$AC_API_ISSUER_ID" ]; then
            KEY="$RUNNER_TEMP/AuthKey.p8"
            echo -n "$AC_API_KEY_P8_BASE64" | base64 --decode > "$KEY"
            echo "Notarizing via App Store Connect API key…"
            xcrun notarytool submit "$DMG" \
              --key "$KEY" --key-id "$AC_API_KEY_ID" --issuer "$AC_API_ISSUER_ID" --wait
          elif [ -n "$APPLE_ID" ] && [ -n "$APPLE_APP_PASSWORD" ] && [ -n "$APPLE_TEAM_ID" ]; then
            echo "Notarizing via Apple ID + app-specific password…"
            xcrun notarytool submit "$DMG" \
              --apple-id "$APPLE_ID" --password "$APPLE_APP_PASSWORD" --team-id "$APPLE_TEAM_ID" --wait
          else
            echo "::warning::Cert is set but NO notarization credentials — the DMG is signed but"
            echo "::warning::NOT notarized, so Gatekeeper still warns on download. Add the App Store"
            echo "::warning::Connect API-key trio OR the Apple-ID trio to notarize. Skipping."
            exit 0
          fi

          # Staple the Apple ticket into the DMG so it validates without a network call,
          # then verify. A non-zero notarytool/stapler exit fails the build on purpose.
          xcrun stapler staple "$DMG"
          xcrun stapler validate "$DMG"
          echo "Notarized + stapled: $DMG"

      # Rename to a STABLE, version-less, platform-named asset so the CHANGELOG /
      # release-body download links (/releases/latest/download/<name>) resolve to
      # the right installer on every release. jpackage bakes the version (and, for
      # deb/rpm, a transformed package name) into its own filename, which a static
      # link cannot track — so we normalise it here. These names MUST match the
      # links in release.yml's changelog-template and CHANGELOG.md.
      - name: Rename installer to a stable platform name
        id: rename
        shell: bash
        run: |
          case "${{ matrix.jpackage-type }}" in
            exe) STABLE="WSBG-Terminal-Windows.exe" ;;
            dmg) STABLE="WSBG-Terminal-macOS.dmg" ;;
            deb) STABLE="WSBG-Terminal-Linux.deb" ;;
            rpm) STABLE="WSBG-Terminal-Linux.rpm" ;;
            *)   echo "::error::unknown jpackage-type '${{ matrix.jpackage-type }}'"; exit 1 ;;
          esac
          SRC=$(find jpackage-output -maxdepth 1 -type f -name "*.${{ matrix.jpackage-type }}" | head -1)
          if [ -z "$SRC" ]; then
            echo "::error::no .${{ matrix.jpackage-type }} produced in jpackage-output/"; exit 1
          fi
          mv "$SRC" "jpackage-output/$STABLE"
          echo "asset=jpackage-output/$STABLE" >> "$GITHUB_OUTPUT"
          echo "Renamed $(basename "$SRC") -> $STABLE"

      # Manual test builds have no release — expose the installer as a
      # downloadable workflow artifact instead.
      - name: Upload as workflow artifact (manual test build)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: WSBG-Terminal-${{ matrix.jpackage-type }}
          path: ${{ steps.rename.outputs.asset }}
          if-no-files-found: error

      - name: Upload to Release
        if: github.event_name == 'release'
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ github.event.release.tag_name }}" \
            "${{ steps.rename.outputs.asset }}" \
            --clobber
